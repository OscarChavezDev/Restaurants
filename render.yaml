# Blueprint de Render (https://render.com/docs/blueprint-spec)
# Despliega el backend Spring Boot en el plan FREE usando el Dockerfile existente.
# En Render: New -> Blueprint -> conectar este repo. Los secretos (sync: false)
# se piden/ingresan en el dashboard al crear el servicio.
services:
  - type: web
    name: restaurants-backend
    runtime: docker
    plan: free
    rootDir: restaurants-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: TZ
        value: America/Lima

      # === Base de datos (Neon) — formato JDBC, con sslmode=require ===
      # Ej: jdbc:postgresql://ep-xxxx.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # === JWT (obligatorios en perfil prod) ===
      - key: JWT_SECRET
        generateValue: true # Render genera un valor aleatorio seguro
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"

      # === CORS + enlaces en correos: dominio del frontend en Vercel ===
      # Ej: https://tu-app.vercel.app (sin slash final)
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

      # === Opcionales (mismos valores que tu .env local) ===
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: tingo-restaurants
      - key: GEMINI_API_KEY
        sync: false
