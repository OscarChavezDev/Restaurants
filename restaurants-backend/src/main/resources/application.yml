spring:
  application:
    name: restaurants-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurants_db}
    username: ${DB_USERNAME:tingo_user}
    password: ${DB_PASSWORD:tingo_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: RestaurantsHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

security:
  jwt:
    secret: ${JWT_SECRET:8f3d2a1b4c5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d1e2f}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
  info:
    title: Restaurants Service API
    description: API del Sistema de Restaurantes - Plataforma Turística Tingo María
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.tingo.restaurants: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/restaurants-service.log
    max-size: 10MB
    max-history: 30

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  max-age: 3600

app:
  # URL pública del frontend (para los enlaces de los correos).
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

resend:
  # Envío de correos vía la API HTTP de Resend (https://resend.com), no SMTP:
  # Render bloquea las conexiones salientes por los puertos SMTP (25/465/587)
  # en todos sus planes, así que Gmail por SMTP nunca puede conectar desde ahí.
  # Si está vacía, se loggea y no se manda (igual que el resto de integraciones).
  api-key: ${RESEND_API_KEY:}
  # "onboarding@resend.dev" funciona sin verificar dominio propio, pero Resend
  # lo limita a mandar solo a la cuenta con la que te registraste — para mandar
  # a cualquier cliente hace falta verificar un dominio propio en Resend y
  # poner acá una dirección de ese dominio.
  from: ${RESEND_FROM:onboarding@resend.dev}

gemini:
  # API key gratuita de Google AI Studio (https://aistudio.google.com/apikey)
  # para el asistente con IA. Si está vacía, el asistente cae a modo reglas.
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
  # Modelo con capacidad de generación de imágenes (fondo del flyer de promociones).
  # Usa la misma api-key de arriba. Si el modelo no está disponible en tu cuenta,
  # ajusta este valor sin tocar código.
  image-model: ${GEMINI_IMAGE_MODEL:gemini-2.5-flash-image}

actify:
  # Sistema de Eventos del ecosistema (https://actify.qd.je/developers/portal).
  # Si está vacía, /restaurants/near-event/{eventId} devuelve lista vacía.
  api-key: ${ACTIFY_API_KEY:}
  base-url: ${ACTIFY_BASE_URL:https://actify.qd.je/api/v1}

hospy:
  # Sistema de Hospedaje del ecosistema (https://hospy.pages.dev/).
  # Si está vacía, /restaurants/{id}/nearby-lodging devuelve lista vacía.
  api-key: ${HOSPY_API_KEY:}
  base-url: ${HOSPY_BASE_URL:https://hospy-api-wm7v5futiq-rj.a.run.app/api/v1}

table-order-integration:
  # Webhook piloto (un solo restaurante: "El Encanto de la Selva") para el
  # software propio de pedidos en mesas. Si está vacía, el endpoint rechaza
  # cualquier llamada con 403.
  api-key: ${TABLE_ORDER_INTEGRATION_API_KEY:}

google:
  oauth:
    # Client ID del OAuth Client (tipo "Aplicación web") de Google Cloud.
    # Se usa como "audience" para validar el ID token que envía el frontend.
    client-id: ${GOOGLE_CLIENT_ID:}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:tingo-restaurants}
