<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Tu reserva está confirmada!</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 8px; padding: 20px;">
        <h2 style="color: #2e7d32;">¡Tu reserva está confirmada, {name}!</h2>
        <p>El restaurante ha confirmado tu reserva.</p>
        <p>Fecha: <strong>{fecha}</strong></p>
        <p>Hora: <strong>{hora}</strong></p>
        <p>¡Te esperamos!</p>
        <p>Gracias por usar nuestra plataforma.</p>
    </div>
</body>
</html>
