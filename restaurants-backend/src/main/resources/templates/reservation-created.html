<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu reserva ha sido recibida</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 8px; padding: 20px;">
        <h2 style="color: #2e7d32;">¡Hola {name}!</h2>
        <p>Hemos recibido tu solicitud de reserva en Tingo María.</p>
        <p>Tu código de reserva es: <strong>{code}</strong></p>
        <p>El restaurante revisará la disponibilidad y te enviaremos otro correo cuando esté confirmada.</p>
        <p>Gracias por usar nuestra plataforma.</p>
    </div>
</body>
</html>
