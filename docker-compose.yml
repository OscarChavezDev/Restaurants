services:

  # ============================================================
  # BASE DE DATOS POSTGRESQL
  # ============================================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: restaurants-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurants_db
      POSTGRES_USER: ${DB_USERNAME:-tingo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tingo_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tingo_user} -d restaurants_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurants-net

  # ============================================================
  # BACKEND - SPRING BOOT
  # ============================================================
  backend:
    build:
      context: ./restaurants-backend
      dockerfile: Dockerfile
    container_name: restaurants-backend
    user: root
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres:5432/restaurants_db?sslmode=disable
      DB_USERNAME: ${DB_USERNAME:-tingo_user}
      DB_PASSWORD: ${DB_PASSWORD:-tingo_pass}
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-seguro-256-bits-minimo-aqui}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-tingo-restaurants}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - restaurants-net

  # ============================================================
  # FRONTEND - NEXT.JS
  # ============================================================
  frontend:
    build:
      context: ./restaurants-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: restaurants-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    networks:
      - restaurants-net

  # ============================================================
  # ADMINER - GESTIÓN BD (solo desarrollo)
  # ============================================================
  adminer:
    image: adminer:4.8.1
    container_name: restaurants-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8888:8080"
    networks:
      - restaurants-net
    profiles:
      - dev

networks:
  restaurants-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local
